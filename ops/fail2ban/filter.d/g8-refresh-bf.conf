# fail2ban filter — brute-force on /v1/auth/refresh.
#
# Only matches FAILED refreshes (success=false). Successful refreshes log
# `"success":true` and a truncated IP, so they can't match <HOST> here even by
# accident. Legitimate clients can fail a refresh (expired token after long
# inactivity) so threshold is lenient; sustained failures from one IP are not.
#
# Matching log line:
#   2026-06-25 12:34:56.789 [thread] INFO auth - {"ts":"...","event":"auth.refresh","ip":"82.65.123.45","success":false,"reason":"token_not_found"}

[Definition]
failregex = ^.*"event":"auth\.refresh".*"ip":"<HOST>".*"success":false.*$
ignoreregex =
