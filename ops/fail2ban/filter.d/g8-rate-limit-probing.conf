# fail2ban filter — repeated Ktor rate-limit hits across endpoints.
#
# Matches the `rate_limit.exceeded` JSON event AuthLogger emits whenever any
# of the 5 Ktor jails (public-auth, magic-link-consume, refresh, account,
# billing) returns 429. The `ip` field is always populated with the real
# client IP, even for the JWT-scoped jails that bucket by user_id — so the
# <HOST> capture works across the board.
#
# Existing jails (g8-magic-link-bf, g8-refresh-bf, …) only see *failed
# auth attempts*. This one catches the orthogonal abuse pattern: someone
# scanning multiple endpoints — even legitimate ones — until they bump the
# rate limit on each.

[Definition]
failregex = ^.*"event":"rate_limit\.exceeded".*"ip":"<HOST>".*$
ignoreregex =
