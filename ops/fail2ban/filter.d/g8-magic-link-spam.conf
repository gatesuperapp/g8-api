# fail2ban filter — IP triggering the per-email rate limit repeatedly.
#
# `suppressed=true` means the per-email-24h bucket overflowed: someone is
# asking for magic links for the same address (or many addresses, since the
# global IP rate limit allows 60/h) — likely enumeration or harassment of
# a real user. AuthLogger keeps the full IP for these events.
#
# Matching log line:
#   2026-06-25 12:34:56.789 [thread] INFO auth - {"ts":"...","event":"magic_link.requested","email_hash":"...","ip":"82.65.123.45","purpose":"unknown","suppressed":true}

[Definition]
failregex = ^.*"event":"magic_link\.requested".*"ip":"<HOST>".*"suppressed":true.*$
ignoreregex =
