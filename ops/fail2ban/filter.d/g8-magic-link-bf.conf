# fail2ban filter — brute-force on magic-link consume endpoint.
#
# Each failed consume (invalid or expired token) logs the full client IP. A few
# stray 401s are normal (user clicked an expired link), so we set a tolerant
# threshold in the jail; a real brute-force will dwarf that.
#
# Matching log line:
#   2026-06-25 12:34:56.789 [thread] INFO auth - {"ts":"...","event":"magic_link.consume_failed","reason":"invalid_or_expired","ip":"82.65.123.45"}

[Definition]
failregex = ^.*"event":"magic_link\.consume_failed".*"ip":"<HOST>".*$
ignoreregex =
