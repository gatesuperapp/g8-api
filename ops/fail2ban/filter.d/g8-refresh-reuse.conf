# fail2ban filter — detects refresh-token reuse after rotation (suspected theft).
#
# A single occurrence is enough: it means an attacker is replaying a token that
# was already rotated by the legitimate client. AuthLogger.refreshReuseDetected
# emits this with the full client IP (see RGPD policy in AuthLogger.kt).
#
# Matching log line (Logback pattern + JSON payload):
#   2026-06-25 12:34:56.789 [thread] WARN auth - {"ts":"...","event":"auth.refresh_reuse_detected","user_id":"...","ip":"82.65.123.45"}

[Definition]
failregex = ^.*"event":"auth\.refresh_reuse_detected".*"ip":"<HOST>".*$
ignoreregex =
