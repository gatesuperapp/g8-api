# fail2ban jails for g8-api auth events.
#
# Reads the dedicated auth log file written by Logback (RollingFileAppender, see
# src/main/resources/logback.xml). We used to read journald directly with
# `backend = systemd`, but on this Debian 12 + fail2ban 1.0.2 box the systemd
# reader silently failed to pick up new entries — `fail2ban-regex` with the same
# journalmatch returned "0 lines processed" even when events were demonstrably
# in journalctl. Switched to file + pyinotify (the same path used by sshd/postfix
# jails here, known to work).
#
# Each jail also emails contact@the-gate.fr via the system MTA (postfix on
# YunoHost is already configured to send mail), with whois on the banned IP.

# --- Confirmed token theft: ban immediately, very long bantime. -------------
[g8-refresh-reuse]
enabled    = true
backend    = auto
filter     = g8-refresh-reuse
logpath    = /var/log/g8-api/auth.log
maxretry   = 1
findtime   = 1h
bantime    = 30d
action     = %(action_)s
             sendmail-whois[name=g8-refresh-reuse, dest=contact@the-gate.fr, sender=fail2ban@the-gate.fr]

# --- Magic-link consume brute-force: 10 failed attempts in 10 min. ----------
# Ktor's per-IP rate limit already caps consume at 20/min; this fail2ban jail
# is the secondary, harsher layer that promotes "sustained abuse" to a real
# firewall ban + an email.
[g8-magic-link-bf]
enabled    = true
backend    = auto
filter     = g8-magic-link-bf
logpath    = /var/log/g8-api/auth.log
maxretry   = 10
findtime   = 10m
bantime    = 24h
action     = %(action_)s
             sendmail-whois[name=g8-magic-link-bf, dest=contact@the-gate.fr, sender=fail2ban@the-gate.fr]

# --- Refresh brute-force: 20 failed refreshes in 10 min. --------------------
# Lenient on purpose: a legitimate client can rack up a few failures (expired
# token after long inactivity, network swap during rotation). Real brute-force
# will blow past 20 easily.
[g8-refresh-bf]
enabled    = true
backend    = auto
filter     = g8-refresh-bf
logpath    = /var/log/g8-api/auth.log
maxretry   = 20
findtime   = 10m
bantime    = 24h
action     = %(action_)s
             sendmail-whois[name=g8-refresh-bf, dest=contact@the-gate.fr, sender=fail2ban@the-gate.fr]

# --- Magic-link mass-mailing abuse: 5 per-email overflows in 1h. ------------
# `suppressed=true` only fires when the per-email-24h bucket is already full.
# Hitting it 5 times in 1h from the same IP = enumeration or harassment.
[g8-magic-link-spam]
enabled    = true
backend    = auto
filter     = g8-magic-link-spam
logpath    = /var/log/g8-api/auth.log
maxretry   = 5
findtime   = 1h
bantime    = 24h
action     = %(action_)s
             sendmail-whois[name=g8-magic-link-spam, dest=contact@the-gate.fr, sender=fail2ban@the-gate.fr]
