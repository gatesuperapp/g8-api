ktor {
    deployment {
        port = 8080
    }

    application {
        modules = [ com.a4a.g8api.ApplicationKt.module ]
    }
    environment = "development"
}

jwt {
    # JWT_SECRET MUST be set via environment variable. No fallback — fail fast if missing.
    secret = ${JWT_SECRET}
    issuer = "g8-api"
    audience = "g8"
    realm = "G8 Tools"
}
storage {
    driverClassName = "org.h2.Driver"
    jdbcURL = "jdbc:h2:file:./db/g8-db"
    jdbcURL = ${?DB_URL}
}