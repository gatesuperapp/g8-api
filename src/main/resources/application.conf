ktor {
    deployment {
        host = "127.0.0.1"
        port = 8080
    }

    application {
        modules = [ com.a4a.g8api.ApplicationKt.module ]
    }
    environment = "development"
}

jwt {
    # JWT_SECRET MUST be set via environment variable. No fallback — fail fast if missing.
    secret = ${JWT_SECRET}
    issuer = "g8-api"
    audience = "g8"
    realm = "G8 Tools"
}
storage {
    # Postgres. DATABASE_URL / DATABASE_DRIVER / DATABASE_USER / DATABASE_PASSWORD
    # override these defaults. Tests bypass this entirely by setting storage.*
    # directly on a MapApplicationConfig (see TestSupport.kt).
    driverClassName = "org.postgresql.Driver"
    driverClassName = ${?DATABASE_DRIVER}
    jdbcURL = "jdbc:postgresql://localhost:5432/g8db"
    jdbcURL = ${?DATABASE_URL}
    # Optional — empty by default so local runs against a passwordless Postgres work.
    username = ""
    username = ${?DATABASE_USER}
    password = ""
    password = ${?DATABASE_PASSWORD}
}