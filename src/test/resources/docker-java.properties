# docker-java defaults its initial /info probe to API 1.32, which Docker Engine 27+
# (Colima, Docker Desktop 27+) rejects with HTTP 400. Pin the API version to a value
# every modern daemon supports (1.40 minimum, 1.54 as of Colima 0.10.3). Testcontainers
# 2.x negotiates automatically and this file can be removed once we upgrade.
api.version=1.44
